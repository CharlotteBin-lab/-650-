        .radio-circle { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #c6c8cc; background: white; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 500; flex-shrink: 0; transition: all 0.1s; }

        .close-modal { background: #007aff; border: none; border-radius: 30px; padding: 12px; width: 100%; color: white; font-size: 16px; margin-top: 16px; cursor: pointer; }
        
        .wrong-book-btn { background: #ff9500; margin-top: 8px; }

器使用单位应对操作快开门式压力容器人员进行安全、节能培训教育。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全法》于2013年6月29日公布，自2014年1月1日起施行。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "临界压力是指液体在临界温度时的压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "消毒锅、灭菌锅属于快开门式的压力容器，必须装有安全联锁装置。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》规定，特种设备安全工作应当坚持安全第一、预防为主、综合治理的原则。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "爆破片装置的排放能力应小于或等于被保护的特种设备安全泄放量。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器的安全附件，属于压力容器范围。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《条例》规定：特种设备存在严重事故隐患，无改造、维修价值，使用单位应当及时予以报废。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器运行检查中发现安全装置损坏时，操作人员应将其拆除或关闭。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《条例》规定：国家鼓励推行科学管理方法，釆用先进技术，对取得显著成绩的单位和个人应当给予奖励。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器修理时，可以用关闭阀门的方式代替用盲板来隔断。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器升温过程中需进行热紧的系统，应在升温同时对容器、管道、阀门、附件等进行均匀热紧。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器内部的压力是指作用在容器器壁上的单位面积上的力。", "options": [{"letter": "A", "text": "正确"}, {"le "question": "压力容器运行检查中发现安全装置损坏时，操作人员应将其拆除或关闭。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "特种设备使用单位应当对其使用的特种设备的安全附件、安全保护装置进行定期校验、检修，并作出记录。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "使用单位应对在用设备进行检查，保证釜内啮合正常，不得采用强行手段或方法开关釜门。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "二硫化碳是损害神经和血管的毒物。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "水在加热过程中达到饱和温度后，若继续对水加热而压力不变，蒸汽温度也升高。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器岀现报警时，应快速判别报警原因，并釆取相应的控制措施。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "设计快开门式压力容器时，应当设置安全联锁装置，并且对其使用环境、校验周期、校验方法等使用技术要求作出规定。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "齿啮式快开门一般应用于蒸压釜、大中型硫化罐等，它开启方便、密封性好，可以承受较高的压力，因此不容易实现自动化联锁控制。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "根据《特种设备目录》的规定，压力容器是指盛装气体或者液体，承载一定压力的密闭设备，其范围规定为最高工作压力大于或者等于0.1MPa（表压）的气体、液化气体和最高工作温度高于或者等于标准沸点的液体、容积大于或者等于30L且内直径（非圆形截面指截面内边界最大几何尺寸）大于或者等于150mm的固定式容器和移动式容器；盛装公称工作压力大于或者等于0.2MPa（表压），且压力与容积的乘积大于或者等于1.0MPa·L的气体、液化气体和标准沸点等于或者低于60°C液体的气瓶氧舱。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "对于手动启闭端盖的快开式压力容器，应设置报警装置。当锁紧件未完全闭合前加压，或容器内部尚有残余压力即松开锁紧件时，能够产生明显的报警信号。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "最高允许工作压力是指定温度下，容器顶部所允许承受的最大表压力。该压力是根据容器受压元件的有效厚度，考虑该元件承受所有载荷而计算所得，且取其最大值。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器压力表校验周期应该根据检修周期确定。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "固定式压力容器与安全阀之间一般不宜装设截止阀门。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "申请人对考试机构答复结果有异议的，可以电话向发证机关提出申诉。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "申请人对考试机构答复结果有异议的，可以书面向发证机关提出申诉。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "裙式支座适用于高大型或重型立式容器的支承。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器介质中的杂质一般不会产生很大危害，所以可不进行控制。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "圆筒形容器的形状特点是轴对称，圆筒是一个平滑的曲面，应力分布比较均匀，承载能力较高，易于制造，便于内件的设置和装拆。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "制定《中华人民共和国特种设备安全法》目的是：加强特种设备安全工作，预防特种设备事故，保障人身和财产安全，促进经济社会发展。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "与罐体内介质接触并且公称直径大于或者等于50mm的钢锻件，不得低于III级。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》所称特种设备是指危险性较大的锅炉、压力容器（含气瓶）、压力管道、电梯、客运索道、大型游乐设施。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "根据《大容规》的规定，快开门式压力容器，是指进出容器通道的端盖或者封头与主体间带有相互嵌套的快速密封锁紧装置的压力容器。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》规定：特种设备安全管理人员、检测人员和作业人员应当按照国家有关规定取得相应资格，方可从事相关工作。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "特种设备作业人员R1资格项目是快开门式压力容器操作。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "爆破片装置泄放反应的动作比安全阀迅速。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "对连续性及系统操作的容器，为防止停车时误操作发生事故，应编制停车方案。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，特种设备作业人员在作业中应当严格执行特种设备的操作规程和有关的安全规章制度。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "标准大气压又称为工程大气压。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器使用单位不得采购已报废的压力容器。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "容器运行期间发现安全附件失效，操作人员应立即釆取紧急措施。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "据事故调查分析，快开门式压力容器爆炸时机多为存在余压时开门和低啮合度时升压。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器内部的压力是指作用在容器器壁上的单位面积上的力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "容器运行期间发现液位异常，釆取措施仍不能得到有效控制，操作人员应立即釆取紧急措施。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "气体的临界温度越高，越容易被液化。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "装卸易燃介质的作业场所应严禁烟火，不得采用易产火花的工具和用品。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《固定式压力容器安全技术监察规程》规定，在用压力容器超过检验期限不按有关规定检验又不申报的，应该监督使用。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "为防止疲劳破坏，快开门式压力容器应尽量减少局部结构的不连续。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器受压元件用材只要满足力学性能和化学性能。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "安全阀上的铅封不得擅自启封，其铭牌不得擅自取下或更换。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《条例》规定：特种设备作业人员在作业中应当执行特种设备的操作规程和有关的安全规章制度。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "当安全阀的整定压力大于或等于0.3MPa时，密封压力为整定压力的90%。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》规定，特种设备检验、检测机构的检验、检测人员可以同时在两个以上检验、检测机构执业；变更执业机构的，应当依法办理变更手续。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《特种设备安全法》于2013年6月29日公布，自2014年1月1日起施行。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "消毒锅、灭菌锅属于快开门式的压力容器，必须装有安全联锁装置。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "长期在高温下运行的压力容器在使用中可能会发生蠕变破坏。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》规定，负责特种设备安全监督管理的部门应当加强特种设备质量宣传教育，普及特种设备质量知识，增强社会公众的特种设备质量意识。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器压力式温度计的特点是精度高。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器需要带压紧固螺栓时，应由持证的带压密封作业人员进行带压密封。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备使用管理规则》规定，新制造的压力容器必须在投用前30日内取得使用登记证，方可投入使用。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器内压力超过设定的压力，安全阀能自动泄放压力，防止超压。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "同壁厚的压力容器直径越小，承压也越高。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器材料的强度指标主要包括抗拉强度和屈服强度。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器安全阀必须在校验有效期内使用，超过校验有效期的安全阀不能使用。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器发生事故有可能会造成严重后果或者产生重大社会影响的，使用单位应制定事故应急专项预案并进行适时演练。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "当容器内压力降至0.003MPa以下时，零压开关会将信号传至电控柜，“釜内有压”指示灯灭，“釜内无压”指示灯亮，同时手动（或电动）减速机控制线路解锁，操作人员可以进行开门操作。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全法》规定，特种设备行业协会应当加强行业自律，推进行业诚信体系建设，提高特种设备安全管理水平。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备使用管理规则》规定，特种设备在使用过程中发现异常情况的，作业人员或维护保养人员应当立即采取应急措施，并且按照规定的程序向使用单位特种设备安全管理人员和单位有关负责人报告。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "锁环式快开门压力容器在拧松保险螺栓时，有“吱……吱”的声音时，应等待无声音后再开启快开门。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《特种设备安全法》规定，禁止使用国家明令淘汰和已经报废的特种设备。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备使用管理规则》规定，特种设备使用单位应当根据本单位的特种设备数量、特征等配备相应的特种设备作业人员，并且在使用特种设备时应保证每班至少有一名持证的作业人员在岗。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器运行时应保持安全距离，不得对设备进行任何检查。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，特种设备作业人员在作业过程中发现事故隐患或者其它不安全因素，应首先向特种设备安全监察机构汇报。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "安全联锁装置是用于安全目的的自动化装置，它通过机械或电气的机构使两个动作具有互相制约的关系。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "爆破片的设计爆破压力不得大于该压力容器的设计压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "换热器的管板和换热管不属于压力容器的主要受压元件。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "全容积用于盛装液化气体时快开门式压力容器不受监管。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "爆破片只要不爆破仍可以继续使用，不需要更换。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，特种设备事故造成死亡2人的事故属于一般事故。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器的使用管理和操作不当是造成压力容器事故的主要原因。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "正常情况下，压力开关检测并判断容器内部压力后发岀信号：有余压时，联锁插销不能脱开，快开门不允许动作。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器压力持续升高时，应立即切断压力源。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器用来防止误操作造成事故的装置就是安全联锁装置。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "爆炸极限范围越宽，下限越低，爆炸危险性也就越小。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "容器内介质为最高工作温度低于其标准沸点的液体时，如果气相空间的容积大于或者等于0.03m3时，也属于《大容规》的适用范围。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "根据《特种设备目录》的规定，固定式压力容器的范围规定为:最高工作压力大于或者等于0.1MPa（表压）的气体、液化气体和最高工作温度高于或者等于标准沸点的液体、容积大于或者等于30L且内直径（非圆形截面指截面内边界最大几何尺寸）大于或者等于150mm。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "易爆介质指气体或者液体的蒸气、薄雾与空气混合形成的爆炸混合物，并且其爆炸下限＜10%，或者爆炸上限和爆炸下限的差值＞20%的介质。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器操作人员应对液面计进行定期清理和保养。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容的韧性破坏一般不会产生塑性变形，但有碎片产生。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器因为设有安全联锁装置，所以可以超压力使用。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "使用快开门式压力容器时因为设有安全联锁装置，所以可以直接进行增压。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "固定式压力容器内介质的危险特性主要表现在介质的燃烧性、爆炸性、毒性和腐蚀性。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "易燃介质的车间或场所需动火时，应经车间主任同意后方可动火。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "停车后，压力容器内的介质应清理干净，达不到安全要求时，严禁人进入容器内。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "立式容器使用的支座形式有：腿式支座、耳式支座、支承式支座和裙式支座。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器在卸压未尽前或带压下人为打开，以及端盖未完全闭合就升压，是造成事故的主要原因之一。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "爆破片装置泄放反应的动作比安全阀迅速。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "特种设备出现故障或者发生异常情况，特种设备使用单位应当对其进行全面检查，消除事故隐患，方可继续使用。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器的全面腐蚀要比局部腐蚀的危害要小。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器运行中，容器法兰间发生泄漏，操作人员应立即紧固螺栓，防止泄漏。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器运行中，操作人员应检查设备的保温层、支座、支撑、紧固件是否完好，基础有无下沉、倾斜及阀门启、闭情况。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "泄漏事故是指压力容器主体或者部件因变形、损伤、断裂失效或者安全附件、安全保护装置损坏等因素造成内部介质非正常外泄的现象。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "使用单位应对在用增压釜进行检查，保证釜内啮合正常，不得采用强行手段或方法开关釜门。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "当压力容器内的表压力小于0.1MPa时称为负压。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器的绝对压力包括压力表上的压力加上容器周围的大气压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器发现工作压力超过规定值，且采取措施仍不能得到有效控制时，应向安全管理人员和单位有关负责人报告。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "关闭快开门式压力容器的快开门时，快开门关闭不能完全到位,但不影响使用，可以正常升压，可以不报告。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "与筒体采用焊接连接不可拆卸的称为封头。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器操作人员应参加单位组织的压力容器应急演", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器发现管路强烈震动且不能及时控制时，应向安全管理人员和单位有关负责人报告。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全法》规定，违反本法规定，应当承担民事赔偿责任和缴纳罚款、罚金，其财产不足以同时支付时，先缴纳罚款、罚金。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "换热压力容器是指主要用于完成介质的加热的压力容器。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "罐体用管法兰、垫片、紧固件的设计，应当参照行业标准HG/T20592~HG/T20635《钢制管法兰、垫片、紧固件》系列标准的规定。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器的安全附件，属于压力容器范围。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "紧急切断阀不能兼着它用。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器压力式温度计的特点是精度高。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "安全阀是通过阀瓣的自动开启，排出介质来降低容器内的超高压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "安全阀每年必须校验一次。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "爆破片是一个因超温而迅速动作的压力敏感元件。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器安全阀开启后重新关闭时的压力称为回座压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器操作人员在巡回检查中如遇事故隐患或其他不安全因素时，应当向现场安全管理人员和单位负责人报告。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "工作压力是指压力容器在正常工艺条件操作下，其顶部出现的表压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力表的精度等级数字越大表示其精度越高。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《特种设备使用管理规则》规定，特种设备使用单位应当根据本单位的特种设备数量、特征等配备相应的特种设备作业人员，并且在使用特种设备时应保证每班至少有一名持证的作业人员在岗。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，特种设备作业人员在作业过程中发现事故隐患或者其它不安全因素，应首先向特种设备安全监察机构汇报。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器上的安全阀必须一个检验周期校验一次。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "安全阀应当铅直安装在压力容器液面以上的气相空间部分，或装设在与压力容器气相空间相连的管道上。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《固定式压力容器安全技术监察规程》规定，属于其监察范围内的压力容器必须内直径大于等于150mm。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "管路连接应当采用法兰或者焊接结构，焊接接头应当优先釆用全焊透对接接头形式。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "换热器的管板和换热管不属于压力容器的主要受压元件。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "空气中容许的毒物浓度值越大，则毒性越小。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "对于间断操作的压力容器，操作时应快速进行。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器要平稳操作，升温降温应缓慢进行。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《作业人员证》遗失或者损毁的，持证人员应当向原发证部门申请补发。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，发生有毒介质泄漏，造成1万人以下转移的属于重大事故。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器安全联锁装置应当满足以下要求：（1）当快开门达到预定关闭部位，方能升压运行；（2）当压力容器的内部压力完全释放，方能打开快开门；（3）具有与上述动作同步的报警功能。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "对液化气体介质的快开门式压力容器，充装前可以对容器进行预冷。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "平移式快开门采用气缸推动封头进行移动，通过封头和筒体法兰带有的卡环进行组合从而实现启闭。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器必须有足够的强度，如强度不够，受压元件在内部压力作用下，会发生塑性变形或发生爆炸事故。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "郑师傅今年66周岁，身体健康。持证期间，无违章作业，也未发生责任事故，因此他可以申请《特种设备作业人员证》复审。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器因为设有安全联锁装置，使用时可以不监控容器内部温度。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "HG/T20660-2017《压力容器中化学介质毒性危害和爆炸危险程度分类标准》适用于移动式压力容器（如钢瓶、槽车容器等）中化学介质的毒性危害和爆炸危险程度的分类。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "易燃介质的车间或场所需动火时，应经车间主任同意后方可动火。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器的检查必须委托有资质的特种设备检测机构进行。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《特种设备使用管理规则》规定，压力容器的使用登记证长期有效。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "立式容器使用的支座形式有：腿式支座、耳式支座、支承式支座和裙式支座。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "所有压力容器上都应开设人孔、手孔。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "充装毒性程度为极度或者高度危害以及易燃、易爆介质的罐体,其装卸口应当由三个相互独立并且串联在一起的装置组成，第一个是紧急切断阀，第二个是球阀或者截止阀，第三个是盲法兰或者等效装置。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "按《中华人民共和国特种设备安全法》事故可分为特别重大事故、重大事故、较大事故、一般事故。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器的结构形式是根据容器的作用、工艺要求、加工设备和制造方法等因素确定的。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》中所称的特种设备是指对人身和财产安全有较大危险性的锅炉、压力容器（含气瓶）、压力管道、电梯、起重机械、客运索道、大型游乐设施、场（厂）内专用机动车辆，以及法律、行政法规规定适用本法的其他特种设备。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器的设计应当考虑疲劳载荷的影响。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "根据《大容规》的规定，用双头螺栓连接的不属于快开门式压力容器，但是如果用活节螺栓连接的则属于快开门式压力容器了。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "当压力容器设计图样或铭牌上标注有最高允许工作压力时，爆破片的爆破压力不得大于该容器的最高允许工作压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "固定式容器的安全阀整定压力应大于压力容器的设计压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力表上警戒红线表示容器允许的最大工作压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《固定式压力容器安全技术监察规程》监察范围的压力容器其工作压力为大于或等于0.1MPa的容器。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《压力容器定期检验规则》规定，压力容器的年度检查以宏观检查为主。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，特种设备作业人员在作业中应当严格执行特种设备的操作规程和有关的安全规章制度。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "水在温度升高时吸收的热量，比其他液体在相同情况下所吸收的热量要多。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "特种设备登记标志应当放置在办公室抽屉里，防止丢失。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "所有压力容器的维修都必须有资格的单位承担。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器使用单位不得采购已报废的压力容器。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "所有压力容器都必须定期检验，否则不准使用。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "操作人员及时、正确判断压力容器故障和处理故障，就能有效防止事故发生。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器操作人员有权拒绝任何违章指挥。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "当压力容器内的表压力小于0.1MPa时称为负压。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器在运行中，只要操作人员精心操作压力容器，压力容器就不会发生事故。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "蠕变破坏是指压力容器局部壁温长期高于某一限度值，而缓慢产生塑性变形，最终导致的破坏。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "操作人员进入现场前，须穿戴防护用品，携带有关操作工具。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器发现安全联锁装置破损时，应向安全管理人员和单位有关负责人报告。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器压力容器的主要受压元件，一般包括壳体、封头（端盖）、膨胀节、设备法兰、M36以上（含M36）的设备主螺柱以及公称直径大于或者等于250mm的接管和管法兰。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "为防止疲劳破坏，快开门式压力容器应尽量减少局部结构的不连续。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "与筒体采用焊接连接不可拆卸的称为封头。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》规定，特种设备检验、检测机构的检验、检测人员可以同时在两个以上检验、检测机构执业；变更执业机构的，应当依法办理变更手续。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》规定，负责特种设备安全监督管理的部门应当加强特种设备质量宣传教育，普及特种设备质量知识，增强社会公众的特种设备质量意识。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》规定，违反本法规定，应当承担民事赔偿责任和缴纳罚款、罚金，其财产不足以同时支付时，先缴纳罚款、罚金。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器在潮湿环境中的腐蚀生锈属于化学腐蚀。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器不得使用非金属材料。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器安全阀与容器之间禁止装设切断阀门。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门式压力容器安全阀开启后重新关闭时的压力称为回座压力。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器韧性破坏会发生明显塑性变形，一般不会产生碎片。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器的基本参数有：压力、温度和容积。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "弹簧管式压力表应根据其变形量的传递机构可分为扇形齿轮式和杠杆式压力表。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备使用管理规则》规定，特种设备使用单位应当按照规则规定，负责特种设备安全管理，承担特种设备安全主体责任。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "容器内介质为最高工作温度低于其标准沸点的液体时，如果气相空间的容积与工作压力乘积大于或者等于2.5MPa·L时，也属于《固定容规》适用范围。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "球冠形封头属于凸形封头的一种。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "安全阀必须在校验有效期内使用，超过检验有效期的安全阀不能使用。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "从压力容器的应力分布情况来看，球形结构最好，圆筒形结构次之，箱形结构最差。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器内压力超过设定的压力，安全阀能自动泄放压力，防止超压。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《固定式压力容器安全技术监察规程》规定，属于其监察范围内的压力容器必须内直径大于等于150mm。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "啮齿型快开门由五大部件构成：釜体法兰、门盖、开门机构、门盖旋转机构、安全联锁装置。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "爆炸极限是指可燃气体、可燃液体的蒸汽或可燃粉尘和空气混合达到一定浓度时，遇到火源会发生爆炸，这个浓度范围称为爆炸极限。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全监察条例》是由国家质量技术监督检验检疫总局颁布的行政法规。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《固定容规》规定：紧急切断装置、安全联锁装置属压力容器的安全附件。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器操作人员应持证上岗，“宁等三分，不抢一秒”，防止违规操作，消除事故隐患。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，发生有毒介质泄漏，造成15万人以上转移的属于特别重大事故。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，发生压力容器、压力管道爆炸的事故，属于较大事故。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器的疲劳载荷与其频繁开关容器通道端盖及操作过程中频繁升温升压、降温降压成正比。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "工业生产和其他行业中常用蒸汽作为加热介质。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "设计温度与设计压力一起作为设计载荷条件。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "固定式压力容器中，毒物危害指数综合反映职业性接触毒物对劳动者健康危害程度的量值。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "易爆介质指气体或者液体的蒸气、薄雾与空气混合形成的爆炸混合物，并且其爆炸下限＜10%，或者爆炸上限和爆炸下限的差值＞20%的介质。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器只应当承受内压。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器操作人员未经专业培训发证上岗操作，是导致压力容器事故的重要原因。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "快开门式压力容器的安全联锁装置校验应委托具有相应资质的检测机构进行。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "圆筒形容器应采用焊接结构。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器开设的人孔、手孔数量应满足工艺要求。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器的结构形式是根据容器的作用、工艺要求、加工设备和制造方法等因素确定的。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "奥氏体不锈耐酸钢是使用最广泛一种耐酸不锈钢，并用于腐蚀性较强的介质中。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》中所称的特种设备是指对人身和财产安全有较大危险性的锅炉、压力容器（含气瓶）、压力管道、电梯、起重机械、客运索道、大型游乐设施、场（厂）内专用机动车辆，以及法律、行政法规规定适用本法的其他特种设备。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》规定：特种设备包括其附属的安全附件、安全保护装置。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "啮齿式快开门压力容器的啮齿一般都比较多，并且都会有余量,因此当发现某一个齿有损坏时，可以先用，再上报。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "特种设备作业人员A1资格项目是快开门式压力容器操作。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "采用焊接结构连接设备本体的压力容器不是快开门式压力容器。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "判断快开门是否关闭到位的元件，主要是行程开关，行程开关的检测部位一般安装在安全手柄等部件上。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "爆破片装置泄放反应的动作比安全阀迅速。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，特种设备作业人员在作业中应当严格执行特种设备的操作规程和有关的安全规章制度。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "退火和回火能够够改善钢的力学性能。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《特种设备安全监察条例》规定，特种设备的使用单位应保证作业人员具备必要的特种设备安全、节能知识。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "为了防止大气腐蚀，停用的压力容器，应该将工作介质保存在里面。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "压力容器停运时，操作人员必须严格控制降温、降压速度。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "承受压力较高的容器，加压时应分段加压。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器运行中的压力和温度升、降，都应做到缓慢进行。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器使用单位应当建立健全安全、节能责任制度，实行制度化、经常化、标准化管理。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "压力容器发生化学爆炸时，通常会发生粉碎性破坏。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "A"}, {"type": "judge", "question": "《固定式压力容器安全技术监察规程》规定，压力容器耐压试验过程中出现泄漏应该立即带压紧固螺栓，防止岀现泄漏现象。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "快开门压力容器如安全联锁装置失灵时，一般不准使用。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "question": "《中华人民共和国特种设备安全法》规定，特种设备是指锅炉、压力容器、压力管道。", "options": [{"letter": "A", "text": "正确"}, {"letter": "B", "text": "错误"}], "answer": "B"}, {"type": "judge", "ques     function saveProgress() {
        if (!currentMode || !currentQuestions.length) return;
        const key = STORAGE_KEYS[currentMode];
        if (!key) return;
        
        const progressData = {
            index: currentIndex,
            userAnswers: userAnswers,
            answeredStatus: answeredStatus
        };
        localStorage.setItem(key, JSON.stringify(progressData));
    }
    
    // 加载指定题型的进度
    function loadProgressForMode(mode) {
        const key = STORAGE_KEYS[mode];
        if (!key) return null;
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : null;
    }
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); 
    }
    
    function getQuestionTypeName(type) {
        if (type === 'multiple') return '多选题';
        if (type === 'single') return '单选题';
        return '判断题';
    }
    
    function formatAnswerDisplay(q, answerLetter) {
        const optMap = new Map(q.options.map(o => [o.letter, o.text]));
        if (answerLetter && answerLetter.includes(',')) {
            return answerLetter.split(',').map(l => l.trim() + '.' + (optMap.get(l.trim()) || '?')).join('；');
        }
        return (answerLetter || '') + '.' + (optMap.get(answerLetter) || '?');
    }
    
    function showProgressModal() {
        if (!currentQuestions.length) return;
        
        let modalHtml = '<div class="modal-overlay" id="progressModal"><div class="modal-content"><div class="modal-title">📊 题目进度</div><div class="progress-grid">';
        
        for (let i = 0; i < currentQuestions.length; i++) {
            let statusClass = '';
            let statusText = (i + 1).toString();
            
            if (answeredStatus[i]) {
                if (answeredStatus[i].isCorrect) {
                    statusClass = 'correct';
                } else if (answeredStatus[i].corrected) {
                    statusClass = 'corrected';
                } else {
                    statusClass = 'wrong';
                }
            }
            
            const isCurrent = (i === currentIndex);
            const currentClass = isCurrent ? 'current' : '';
            
            modalHtml += `<div class="progress-circle ${statusClass} ${currentClass}" data-index="${i}">${statusText}</div>`;
        }
        
        modalHtml += '</div><button class="close-modal" id="closeModalBtn">关闭</button></div></div>';
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        document.querySelectorAll('.progress-circle').forEach(el => {
            el.addEventListener('click', () => {
                const index = parseInt(el.dataset.index);
                currentIndex = index;
                saveProgress();
                renderQuestion();
                document.getElementById('progressModal')?.remove();
            });
        });
        
        document.getElementById('closeModalBtn')?.addEventListener('click', () => {
            document.getElementById('progressModal')?.remove();
        });
    }
    
    function renderMenu() {
        const wrongCount = wrongBook.length;
        document.getElementById('app').innerHTML = `
            <div class="header"><div class="placeholder"></div><div class="title-area">📚 题库练习</div><div class="placeholder"></div></div>
            <div class="menu-screen">
                <div class="type-btn" data-mode="single">📖 单选题 (${QUIZ_DATA.single.length})</div>
                <div class="type-btn" data-mode="multiple">📚 多选题 (${QUIZ_DATA.multiple.length})</div>
                <div class="type-btn" data-mode="judge">⚖️ 判断题 (${QUIZ_DATA.judge.length})</div>
                <div class="type-btn" data-mode="random">🎲 随机测试 (混合)</div>
                <div class="type-btn wrong-book-btn" data-mode="wrongbook">📓 错题本 (${wrongCount}题)</div>
                <div class="reset-notice">← 退出自动保存各题型进度 | 点击右上角数字查看进度</div>
            </div>`;
        
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                if (mode === 'wrongbook') {
                    startWrongBook();
                } else {
                    startQuiz(mode);
                }
            });
        });
    }
    
    function startWrongBook() {
        if (wrongBook.length === 0) {
            alert("📭 错题本为空，继续加油！");
            return;
        }
        const questions = [...wrongBook];
        currentMode = 'wrongbook';
        currentQuestions = questions;
        currentIndex = 0;
        userAnswers = {};
        answeredStatus = {};
        saveProgress();
        renderQuestion();
    }
    
    function startQuiz(mode) {
        let questions = [];
        if (mode === 'multiple') questions = [...QUIZ_DATA.multiple];
        else if (mode === 'single') questions = [...QUIZ_DATA.single];
        else if (mode === 'judge') questions = [...QUIZ_DATA.judge];
        else if (mode === 'random') {
            questions = shuffleArray([...QUIZ_DATA.multiple, ...QUIZ_DATA.single, ...QUIZ_DATA.judge]);
        }
        
        if (!questions.length) { alert("暂无题目"); return; }
        
        // 加载该题型的独立进度
        const savedProgress = loadProgressForMode(mode);
        let startIndex = 0;
        let savedAnswers = {};
        let savedStatus = {};
        
        if (savedProgress && savedProgress.index < questions.length) {
            startIndex = savedProgress.index;
            savedAnswers = savedProgress.userAnswers || {};
            savedStatus = savedProgress.answeredStatus || {};
        }
        
        currentMode = mode;
        currentQuestions = questions;
        currentIndex = startIndex;
        userAnswers = savedAnswers;
        answeredStatus = savedStatus;
        saveProgress();
        renderQuestion();
    }
    
    function checkAnswer(selected, correctAnswer, isMultiple) {
        let userNorm = selected;
        if (isMultiple) {
            const letters = selected.toUpperCase().match(/[A-Z]/g);
            if (letters) {
                const unique = [...new Set(letters)];
                unique.sort();
                userNorm = unique.join(',');
            } else {
                userNorm = '';
            }
        }
        let correctNorm = normalizeAnswer(correctAnswer);
        return userNorm === correctNorm;
    }
    
    function renderQuestion() {
        if (currentIndex >= currentQuestions.length) {
            if (currentMode === 'wrongbook') {
                alert("🎉 恭喜！错题本已清空！");
                renderMenu();
            } else {
                alert("🎉 恭喜完成所有题目！");
                renderMenu();
            }
            return;
        }
        
        const q = currentQuestions[currentIndex];
        const isMultiple = q.type === 'multiple';
        const selectedVal = userAnswers[currentIndex] || '';
        const typeName = getQuestionTypeName(q.type);
        
        let optionsHtml = q.options.map(opt => {
            let isSelected = false;
            if (isMultiple) {
                isSelected = selectedVal.split(',').map(s => s.trim()).includes(opt.letter);
            } else {
                isSelected = (selectedVal === opt.letter);
            }
            return `<div class="option-item ${isSelected ? 'selected' : ''}" data-letter="${opt.letter}" data-multiply="${isMultiple}">
                        <div class="radio-circle">${opt.letter}</div>
                        <div class="option-text">${escapeHtml(opt.text)}</div>
                    </div>`;
        }).join('');
        
        let feedbackHtml = '';
        let showConfirmBtn = true;
        if (answeredStatus[currentIndex]) {
            showConfirmBtn = false;
            if (!answeredStatus[currentIndex].isCorrect) {
                feedbackHtml = `<div class="feedback-area"><div class="error-highlight">❌ 回答错误</div>
                    <div>你的答案：${escapeHtml(answeredStatus[currentIndex].userAnswerDisplay || '未选择')}</div>
                    <div>正确答案：${escapeHtml(answeredStatus[currentIndex].correctDisplay)}</div>
                    <button class="btn-confirm next-btn" id="nextQuestionBtn">下一题 →</button></div>`;
            }
        }
        
        const typeLabel = (currentMode === 'random' || currentMode === 'wrongbook') ? `【${typeName}】` : '';
        
        document.getElementById('app').innerHTML = `
            <div class="header">
                <button class="back-arrow" id="exitArrow">←</button>
                <div class="title-area">${currentMode === 'wrongbook' ? '📓 错题本' : (currentMode === 'random' ? '🎲 随机测试' : typeName)}</div>
                <div class="progress-info" id="progressBtn">${currentIndex+1}/${currentQuestions.length}</div>
            </div>
            <div class="quiz-card">
                <div class="question-text">${typeLabel}${escapeHtml(q.question)}</div>
                <div class="options-area" id="optionsContainer">${optionsHtml}</div>
                ${showConfirmBtn ? '<button class="btn-confirm" id="confirmBtn">确定</button>' : ''}
                ${feedbackHtml}
            </div>`;
        
        document.querySelectorAll('.option-item').forEach(div => {
            div.addEventListener('click', (e) => {
                if (answeredStatus[currentIndex]) return;
                const letter = div.dataset.letter;
                const isMultiply = div.dataset.multiply === 'true';
                let cur = userAnswers[currentIndex] || '';
                if (isMultiply) {
                    let set = new Set(cur ? cur.split(',') : []);
                    if (set.has(letter)) {
                        set.delete(letter);
                    } else {
                        set.add(letter);
                    }
                    userAnswers[currentIndex] = Array.from(set).sort().join(',');
                } else {
                    userAnswers[currentIndex] = letter;
                }
                renderQuestion();
            });
        });
        
        const confirmBtn = document.getElementById('confirmBtn');
        if (confirmBtn) {
            confirmBtn.addEventListener('click', () => {
                const selected = userAnswers[currentIndex] || '';
                if (!selected && q.type !== 'multiple') { alert("请选择一个选项"); return; }
                if (q.type === 'multiple' && !selected) { alert("请至少选择一个选项"); return; }
                
                const isCorrect = checkAnswer(selected, q.answer, isMultiple);
                const correctDisplay = formatAnswerDisplay(q, q.answer);
                let userAnswerDisplay = selected;
                if (isMultiple && selected) {
                    userAnswerDisplay = formatAnswerDisplay(q, selected);
                } else if (selected) {
                    userAnswerDisplay = formatAnswerDisplay(q, selected);
                }
                
                if (isCorrect) {
                    if (currentMode === 'wrongbook') {
                        removeFromWrongBook(q);
                    } else if (currentMode === 'random') {
                        removeFromWrongBook(q);
                    }
                    
                    answeredStatus[currentIndex] = { 
                        isCorrect: true, 
                        userAnswer: selected, 
                        correctDisplay: correctDisplay,
                        userAnswerDisplay: userAnswerDisplay
                    };
                    
                    if (currentIndex + 1 < currentQuestions.length) {
                        currentIndex++;
                        renderQuestion();
                    } else {
                        if (currentMode === 'wrongbook') {
                            alert("🎉 恭喜！错题本已清空！");
                            renderMenu();
                        } else {
                            alert("🎉 恭喜完成所有题目！");
                            renderMenu();
                        }
                    }
                    saveProgress();
                } else {
                    if (currentMode === 'random' || currentMode === 'multiple' || currentMode === 'single' || currentMode === 'judge') {
                        addToWrongBook(q);
                    }
                    answeredStatus[currentIndex] = { 
                        isCorrect: false, 
                        userAnswer: selected, 
                        correctDisplay: correctDisplay,
                        userAnswerDisplay: userAnswerDisplay,
                        corrected: false 
                    };
                    renderQuestion();
                    saveProgress();
                }
            });
        }
        
        const nextBtn = document.getElementById('nextQuestionBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (currentIndex + 1 < currentQuestions.length) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    if (currentMode === 'wrongbook') {
                        alert("🎉 恭喜！错题本已清空！");
                        renderMenu();
                    } else {
                        alert("🎉 恭喜完成所有题目！");
                        renderMenu();
                    }
                }
                saveProgress();
            });
        }
        
        const exitArrow = document.getElementById('exitArrow');
        if (exitArrow) {
            exitArrow.addEventListener('click', () => {
                saveProgress();
                renderMenu();
            });
        }
        
        const progressBtn = document.getElementById('progressBtn');
        if (progressBtn) {
            progressBtn.addEventListener('click', () => {
                showProgressModal();
            });
        }
    }
    
    console.log("题库加载完成:", QUIZ_DATA);
    
    loadWrongBook();
    renderMenu();
</script>

</html>
